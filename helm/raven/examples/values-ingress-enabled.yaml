# Ingress configuration example
# Use this values file to enable Ingress for TCP protocols (IMAP, LMTP, etc.)

# Note: This requires nginx-ingress controller with TCP proxy support configured
# See: https://kubernetes.github.io/ingress-nginx/user-guide/exposing-tcp-udp-services/

ingress:
  enabled: true
  className: "nginx"

  # Annotations for nginx ingress controller TCP services
  annotations:
    # These annotations tell nginx-ingress to handle TCP traffic
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

  # Hosts for the ingress (typically mail server domain)
  hosts:
    - mail.example.com

  # TLS configuration
  tls:
    - secretName: raven-tls-cert
      hosts:
        - mail.example.com

# When using Ingress, you might want ClusterIP service
# as the ingress will handle external traffic
service:
  type: ClusterIP
  # Remove LoadBalancer annotations
  annotations: {}

# Example for Nginx Ingress Controller TCP handling:
# The nginx-ingress controller needs to be configured to handle TCP services
# via a ConfigMap or via values. Each service port needs a mapping.
#
# For nginx-ingress, you would configure in values or via ConfigMap:
# data:
#   "143": "default/raven:143"    # IMAP
#   "993": "default/raven:993"    # IMAPS
#   "24":  "default/raven:24"     # LMTP
#   "12345": "default/raven:12345" # Admin
#
# This allows the Ingress controller to proxy TCP connections for these port ranges.
#
# Deployment command example:
# helm install raven ./helm/raven \
#   -f helm/raven/examples/values-ingress-enabled.yaml \
#   --set ingress.hosts[0]=mail.yourdomain.com \
#   --set ingress.tls[0].hosts[0]=mail.yourdomain.com
