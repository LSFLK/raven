# Raven IMAP Server Configuration Example

domain: "example.com"
auth_server_url: "http://auth-service:8080"

# SASL Authentication Scope
# Controls where SASL authentication is enforced
# Options: "tcp_only", "unix_socket_only", "all" (default)
# - tcp_only: Apply SASL only on TCP connections (secure external access, trust local)
# - unix_socket_only: Apply SASL only on Unix domain sockets (secure local IPC)
# - all: Apply SASL to all connection types (maximum security)
sasl_scope: "all"

# S3-Compatible Blob Storage Configuration
blob_storage:
  enabled: true
  endpoint: "http://localhost:8333" # SeaweedFS endpoint
  region: "us-east-1"
  bucket: "email-attachments"
  access_key: "your-access-key"
  secret_key: "your-secret-key"
  timeout: 30 # seconds

